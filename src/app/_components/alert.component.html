<div *ngIf="alert.length" class="container">
    <div class="m-3">
        <div*ngFor="let alert of alert" class="{{cssClasses(alert)}}">
            <span [innerHTML]="alert.message"></span>
            <button class="btn-close" (click)="removeAlert(alert)"></button>
        </div>
    </div>
</div>
